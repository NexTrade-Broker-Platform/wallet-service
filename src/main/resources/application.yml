spring:
  application:
    name: wallet-service
  datasource:
    url: jdbc:postgresql://localhost:5432/db_wallet
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8082

internal:
  api-key: ${INTERNAL_API_KEY}